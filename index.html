<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USAvionix — CEO Message</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── CC toggle ── */
  .cc-toggle {
    position: fixed;
    top: 20px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    z-index: 100;
    user-select: none;
    font-size: 12px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .cc-toggle:hover { color: #aaa; }
  .cc-toggle.active { color: #fff; }
  .cc-toggle svg { width: 16px; height: 16px; }

  /* ── iPhone silhouette ── */
  .phone {
    width: 375px;
    height: 812px;
    border: 2px solid #333;
    border-radius: 44px;
    background: #000;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 28px;
    background: #000;
    border-radius: 0 0 18px 18px;
    border-bottom: 1px solid #282828;
    border-left: 1px solid #282828;
    border-right: 1px solid #282828;
    z-index: 10;
  }
  .phone::after {
    content: '9:41';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    z-index: 11;
  }

  .screen {
    width: 100%;
    height: 100%;
    padding: 52px 20px 20px;
    overflow-y: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* ── Placeholder blocks ── */
  .ph { background: #1c1c1c; border-radius: 4px; width: 100%; }
  .ph-header {
    height: 44px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    padding: 0 12px;
  }
  .ph-header::before { content: ''; display: block; width: 24px; height: 2px; background: #3a3a3a; margin-right: 12px; }
  .ph-header::after { content: ''; display: block; width: 60px; height: 2px; background: #3a3a3a; }
  .ph-block { height: 80px; margin-bottom: 12px; }
  .ph-block.tall { height: 120px; }
  .ph-block.short { height: 48px; }
  .ph-lines { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .ph-line { height: 2px; background: #1c1c1c; border-radius: 1px; }
  .ph-line.w90 { width: 90%; }
  .ph-line.w80 { width: 80%; }
  .ph-line.w60 { width: 60%; }
  .ph-line.w40 { width: 40%; }

  /* ── Audio module ── */
  .audio-module {
    margin: 20px 0;
    padding: 16px;
    border: 1px solid #282828;
    border-radius: 12px;
    background: #0c0c0c;
  }
  .mod-label {
    font-size: 10px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Player row: headshot + FFT */
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Headshot = play button */
  .avatar-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: none;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    padding: 0;
  }
  .avatar-btn img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .avatar-btn .av-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .avatar-btn:hover .av-overlay { background: rgba(0,0,0,0.25); }
  .avatar-btn .av-overlay svg { width: 16px; height: 16px; fill: #fff; }
  .avatar-btn .ico-pause { display: none; }
  .playing .avatar-btn .ico-play { display: none; }
  .playing .avatar-btn .ico-pause { display: block; }
  .playing .avatar-btn .av-overlay { background: rgba(0,0,0,0.2); }

  /* Pulse ring */
  .avatar-btn::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: all 0.4s;
  }
  .playing .avatar-btn::after {
    border-color: #444;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
  }

  /* FFT + progress combined */
  .fft-progress {
    flex: 1;
    height: 40px;
    position: relative;
    cursor: pointer;
  }
  .fft-progress canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Meta row */
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 8px;
  }
  .meta-name {
    font-size: 11px;
    font-weight: 500;
    color: #777;
  }
  .meta-time {
    font-size: 10px;
    color: #555;
    font-variant-numeric: tabular-nums;
  }

  /* Transcript */
  .transcript {
    max-height: 100px;
    overflow-y: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
    margin-top: 10px;
    transition: max-height 0.4s, opacity 0.4s;
  }
  .transcript::-webkit-scrollbar { display: none; }
  .transcript.hidden { max-height: 0; opacity: 0; overflow: hidden; margin-top: 0; }
  .transcript-line {
    font-size: 12px;
    line-height: 1.6;
    color: #3a3a3a;
    padding: 3px 0;
    cursor: pointer;
    transition: color 0.3s;
  }
  .transcript-line:hover { color: #888; }
  .transcript-line.active { color: #ccc; }
  .transcript-line.past { color: #666; }

  /* ── Responsive ── */
  @media (max-height: 900px) {
    .phone { height: 720px; width: 333px; }
  }
  @media (max-height: 780px) {
    .phone { height: 640px; width: 296px; border-radius: 36px; }
    .phone::before { width: 120px; height: 24px; border-radius: 0 0 14px 14px; }
  }
  @media (max-width: 420px) {
    .phone { width: calc(100vw - 32px); height: calc(100vh - 80px); border-radius: 0; border: none; }
    .phone::before { display: none; }
    .phone::after { display: none; }
    .cc-toggle { top: 8px; right: 12px; }
  }
</style>
</head>
<body>

<!-- CC Toggle -->
<div class="cc-toggle active" id="ccToggle">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
  <span id="ccLabel">CC ON</span>
</div>

<!-- iPhone -->
<div class="phone">
  <div class="screen">

    <div class="ph ph-header"></div>
    <div class="ph ph-block"></div>
    <div class="ph-lines">
      <div class="ph-line w90"></div>
      <div class="ph-line w80"></div>
      <div class="ph-line w60"></div>
    </div>

    <!-- ═══ Audio Module ═══ -->
    <div class="audio-module" id="audioModule">
      <div class="mod-label">Our Mission</div>
      <div class="player-row">
        <button class="avatar-btn" id="playBtn">
          <img src="CS_headshot_400x400.png" alt="Christian Sanz">
          <div class="av-overlay">
            <svg class="ico-play" viewBox="0 0 24 24"><polygon points="8,4 20,12 8,20"/></svg>
            <svg class="ico-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="3.5" height="16"/><rect x="14.5" y="4" width="3.5" height="16"/></svg>
          </div>
        </button>
        <div class="fft-progress" id="fftContainer">
          <canvas id="fftCanvas"></canvas>
        </div>
      </div>
      <div class="meta-row">
        <span class="meta-name">Christian Sanz, Founder & CEO</span>
        <span class="meta-time" id="timeLabel">0:00 / 4:00</span>
      </div>
      <div class="transcript" id="transcript"></div>
    </div>

    <div class="ph-lines">
      <div class="ph-line w80"></div>
      <div class="ph-line w90"></div>
      <div class="ph-line w40"></div>
    </div>
    <div class="ph ph-block short"></div>
    <div class="ph ph-block tall"></div>
    <div class="ph-lines">
      <div class="ph-line w60"></div>
      <div class="ph-line w80"></div>
    </div>
    <div class="ph ph-block"></div>

  </div>
</div>

<script>
// ─── Timestamped transcript (re-transcribed in 15s chunks against trimmed audio) ───
const TRANSCRIPT = [
  { start: 0.2,   end: 4.5,   text: "Hi, I\u2019m Christian Sanz, Founder and CEO of USAvionix." },
  { start: 4.5,   end: 10.5,  text: "For nearly two decades, I\u2019ve been building companies in core technologies around drones, robotics, and 3D sensing." },
  { start: 10.5,  end: 16.0,  text: "After exiting my previous company, I started thinking about a much bigger question:" },
  { start: 16.0,  end: 22.0,  text: "What would an aerial system look like if it were designed from the beginning to operate autonomously?" },
  { start: 22.0,  end: 25.0,  text: "That question is what led to USAvionix." },
  { start: 25.0,  end: 35.0,  text: "Over the past year, we\u2019ve assembled a team of engineers, researchers, and builders working across autonomy, AI, aerospace, and robotics to bring this vision to life." },
  { start: 35.0,  end: 40.0,  text: "Over the coming months, we\u2019re excited to introduce you to the people behind it." },
  { start: 40.0,  end: 47.0,  text: "At USAvionix, we\u2019re building what we call sentient drones for good." },
  { start: 47.0,  end: 53.0,  text: "Most drones today are still tools that humans fly. They collect data, stream video." },
  { start: 53.0,  end: 60.0,  text: "A person has to watch the feed, interpret what is happening, and decide what to do next." },
  { start: 60.0,  end: 66.0,  text: "That workflow simply does not match the speed and scale of the challenges we face today." },
  { start: 66.0,  end: 72.0,  text: "Wildfires spread in minutes. Critical infrastructure spans hundreds of miles." },
  { start: 72.0,  end: 80.0,  text: "Security threats can move faster than a human operator can analyze a video feed. A person watching a screen cannot keep up with that scale." },
  { start: 80.0,  end: 84.0,  text: "We believe the system itself needs to take on the responsibility." },
  { start: 84.0,  end: 92.0,  text: "What has changed in the last few years is the maturity of AI. We can now use AI not just to analyze data, but to design the system." },
  { start: 92.0,  end: 97.0,  text: "Integrate the complex stacks, and assist in operating them in real time." },
  { start: 97.0,  end: 108.0, text: "At USAvionix, AI is embedded across the entire platform. It helps define missions, coordinate the aircraft, interpret sensor data, and continuously improve how the system operates." },
  { start: 108.0, end: 112.0, text: "That shift is what makes true autonomy possible now." },
  { start: 112.0, end: 125.0, text: "To make that possible, we\u2019re vertically integrating the entire system \u2014 the aircraft, the sensors, the onboard AI, the autonomy software, and the intelligence platform that connects everything together." },
  { start: 125.0, end: 132.0, text: "The scale of what we\u2019re building is dramatically different than traditional systems. A human operator might analyze dozens of objects a minute." },
  { start: 132.0, end: 141.0, text: "Our architecture is designed to perform thousands of detections every second \u2014 continuously identifying vehicles, people, anomalies, and changes across very large areas." },
  { start: 141.0, end: 145.0, text: "That difference in scale changes what these systems can actually do." },
  { start: 145.0, end: 153.0, text: "Instead of watching a single location, they can monitor entire regions continuously and detect risk far earlier." },
  { start: 153.0, end: 165.0, text: "The aircraft itself is also built for a completely different performance envelope. Most drones today operate at roughly 30 to 40 kilometers per hour and they\u2019re very limited in how much data they can collect." },
  { start: 165.0, end: 177.0, text: "Our systems are being designed to operate at 400 to 500 kilometers per hour, allowing a single aircraft to cover extremely large operational areas." },
  { start: 177.0, end: 186.0, text: "Combined with advanced optical sensing and onboard intelligence, this creates a new category of aerial awareness." },
  { start: 186.0, end: 193.0, text: "The applications are incredibly important. Protecting critical infrastructure that our societies depend on every single day." },
  { start: 193.0, end: 200.0, text: "Supporting public safety teams and first responders. Helping firefighters detect and track wildfires earlier." },
  { start: 200.0, end: 205.0, text: "Assisting coast guards in locating people cast across vast oceans." },
  { start: 205.0, end: 213.0, text: "And supporting national security missions where speed, awareness, and autonomy matter." },
  { start: 213.0, end: 220.0, text: "As the world becomes more complex and interconnected, the challenges we face are evolving just as quickly." },
  { start: 220.0, end: 228.0, text: "We believe autonomous systems will become essential tools for keeping society safe, resilient, and prepared." },
  { start: 228.0, end: 237.0, text: "Our goal is very simple: build intelligent aerial systems that can observe the world at scale, detect problems earlier, and help people respond faster." },
  { start: 237.0, end: 241.0, text: "That\u2019s the mission behind USAvionix \u2014 and we\u2019re just getting started." }
];

// ─── Audio + Web Audio API ───
const audio = new Audio('final-audio.mp3');
audio.preload = 'auto';
let audioCtx, analyser, source, dataArray;
let isPlaying = false;
let ccVisible = true;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  analyser.smoothingTimeConstant = 0.78;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ─── Play / Pause ───
document.getElementById('playBtn').addEventListener('click', () => {
  initAudio();
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('audioModule').classList.remove('playing');
  } else {
    audio.play();
    isPlaying = true;
    document.getElementById('audioModule').classList.add('playing');
    renderFFT();
  }
});

// ─── CC Toggle ───
document.getElementById('ccToggle').addEventListener('click', () => {
  ccVisible = !ccVisible;
  document.getElementById('transcript').classList.toggle('hidden', !ccVisible);
  document.getElementById('ccToggle').classList.toggle('active', ccVisible);
  document.getElementById('ccLabel').textContent = ccVisible ? 'CC ON' : 'CC OFF';
});

// ─── FFT rendering (bars with played/unplayed dimming) ───
const canvas = document.getElementById('fftCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const c = document.getElementById('fftContainer');
  canvas.width = c.offsetWidth * devicePixelRatio;
  canvas.height = c.offsetHeight * devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawBars(null); });

function renderFFT() {
  if (!isPlaying) { drawBars(null); return; }
  requestAnimationFrame(renderFFT);
  analyser.getByteFrequencyData(dataArray);
  drawBars(dataArray);
}

function drawBars(data) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const bars = 44, gap = 2;
  const bw = (w - (bars - 1) * gap) / bars;
  const pct = audio.duration ? audio.currentTime / audio.duration : 0;

  for (let i = 0; i < bars; i++) {
    const pos = i / bars;
    let val;
    if (data) {
      const bin = Math.floor((i / bars) * (data.length * 0.8)) + 2;
      val = data[Math.min(bin, data.length - 1)] / 255;
    } else {
      val = 0.08;
    }
    const bh = Math.max(2, val * h * 0.85);
    const x = i * (bw + gap);
    const y = (h - bh) / 2;
    const played = pos <= pct;
    const alpha = played ? (0.3 + val * 0.55) : (0.1 + val * 0.2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(x, y, bw, bh);
  }
}
drawBars(null);

// ─── Scrub ───
function scrub(e) {
  initAudio();
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * (audio.duration || 251);
  if (!isPlaying) document.getElementById('playBtn').click();
}
document.getElementById('fftContainer').addEventListener('click', scrub);

// ─── Time + progress ───
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
}

audio.addEventListener('timeupdate', () => {
  document.getElementById('timeLabel').textContent =
    `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
  updateTranscript(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('timeLabel').textContent = `0:00 / ${formatTime(audio.duration)}`;
});

audio.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('audioModule').classList.remove('playing');
  drawBars(null);
});

// ─── Transcript ───
const transcriptEl = document.getElementById('transcript');
let scrollTarget = 0;  // target scroll position
let scrollCurrent = 0; // current interpolated scroll position
let scrollRAF = null;

TRANSCRIPT.forEach((seg) => {
  const div = document.createElement('div');
  div.className = 'transcript-line';
  div.textContent = seg.text;
  div.addEventListener('click', () => {
    initAudio();
    audio.currentTime = seg.start;
    if (!isPlaying) document.getElementById('playBtn').click();
  });
  transcriptEl.appendChild(div);
});

// Smooth scroll interpolation — eases toward target every frame
function smoothScroll() {
  const diff = scrollTarget - scrollCurrent;
  if (Math.abs(diff) < 0.5) {
    scrollCurrent = scrollTarget;
  } else {
    scrollCurrent += diff * 0.08; // ease factor — lower = smoother/slower
  }
  transcriptEl.scrollTop = scrollCurrent;
  scrollRAF = requestAnimationFrame(smoothScroll);
}
// Start the scroll loop
scrollRAF = requestAnimationFrame(smoothScroll);

function updateTranscript(time) {
  const lines = transcriptEl.querySelectorAll('.transcript-line');
  let activeIndex = -1;
  TRANSCRIPT.forEach((seg, i) => { if (time >= seg.start && time < seg.end) activeIndex = i; });
  lines.forEach((line, i) => {
    line.classList.remove('active', 'past');
    if (i === activeIndex) {
      line.classList.add('active');
      // Pin active line ~15% from top of container, so upcoming lines are visible below
      const lineTop = line.offsetTop - transcriptEl.offsetTop;
      scrollTarget = lineTop - transcriptEl.clientHeight * 0.15;
      scrollTarget = Math.max(0, scrollTarget);
    } else if (i < activeIndex) {
      line.classList.add('past');
    }
  });
}
</script>
</body>
</html>
